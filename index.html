<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Origin Project</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#050505;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
text-align:center;
animation:fade 2s ease;
padding:20px;
}

h1{
font-size:64px;
letter-spacing:8px;
margin-bottom:20px;
}

p{
font-size:22px;
color:#bdbdbd;
margin-bottom:35px;
}

.line{
width:220px;
height:2px;
background:white;
margin:auto;
opacity:.4;
}

footer{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
font-size:14px;
color:#666;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

</head>

<body>

<div class="container">
<h1>ORIGIN PROJECT</h1>

<p>Every great journey begins with a single origin.</p>

<div class="line"></div>

</div>

<footer>
© 2026 Origin Project
</footer>

</body>
</html>
